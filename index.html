<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Tennis - Lista Oficial de Franqueados</title>
    <!-- Bibliotecas para ler CSV (Google Sheets) e Exportar Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            /* Cores Oficiais Fast Tennis */
            --primary: #1E46C5;        
            --secondary: #122B7A;      
            --accent: #19F000;         
            --accent-hover: #14C000;   
            --bg: #F4F6FA;             
            --card-bg: rgba(255, 255, 255, 0.95); 
            --text-main: #1A1A2E;      
            --text-light: #5A5A72;     
            --border: #D9D9D9;         
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--bg); 
            background-image: url('fundo.jpg'); 
            background-blend-mode: overlay;
            background-color: rgba(244, 246, 250, 0.85); 
            color: var(--text-main); padding: 20px; 
            background-size: cover; background-attachment: fixed; background-position: center; transition: 0.5s ease-in-out;
        }

        .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            backdrop-filter: blur(10px); color: white; padding: 24px 30px; border-radius: 12px; margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 32px rgba(30, 70, 197, 0.2);
            flex-wrap: wrap; gap: 16px;
        }
        
        .brand-container { display: flex; align-items: center; gap: 16px; }
        .logo-box {
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: 0.3s; height: 50px; 
        }
        .logo-box:hover { opacity: 0.8; }
        .logo-box img { height: 100%; width: auto; object-fit: contain; }

        .header-title h1 { font-size: 26px; margin-bottom: 4px; font-weight: 800; letter-spacing: -0.5px;}
        .header-title p { font-size: 14px; color: rgba(255,255,255,0.8); font-weight: 500;}
        .highlight-text { color: var(--accent); }

        .update-badge {
            background: rgba(0, 0, 0, 0.2); color: #E2E8F0; padding: 6px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1);
        }

        /* PAINEL DE SINCRONIZAÇÃO */
        .sync-panel {
            background: #FFFFFF; padding: 24px; border-radius: 12px; margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;
            border-left: 6px solid var(--accent); box-shadow: 0 4px 15px rgba(30, 70, 197, 0.05);
        }
        .sync-info h2 { font-size: 18px; color: var(--primary); font-weight: 800; display:flex; align-items:center; gap:8px; margin-bottom: 6px;}
        .sync-info p { font-size: 13px; color: var(--text-light); line-height: 1.4;}
        
        .status-dot { display: inline-block; width: 10px; height: 10px; background-color: #F59E0B; border-radius: 50%; animation: pulse 1.5s infinite; }
        .status-dot.online { background-color: var(--accent); animation: none; }
        .status-dot.error { background-color: #EF4444; animation: none; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-sync {
            background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; font-size: 14px;
            font-weight: 700; cursor: pointer; transition: 0.2s; border: none; box-shadow: 0 4px 10px rgba(30, 70, 197, 0.2);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-sync:hover { background: var(--secondary); transform: translateY(-2px); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            flex: 1; padding: 16px; background: rgba(255, 255, 255, 0.85); border: 2px solid var(--border);
            border-radius: 10px; font-size: 16px; font-weight: 700; color: var(--text-light); cursor: pointer; transition: 0.2s;
            min-width: 250px; display: flex; justify-content: center; align-items: center;
        }
        .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
        .tab-btn.active { background: #FFFFFF; border-color: var(--primary); color: var(--primary); box-shadow: 0 4px 12px rgba(30, 70, 197, 0.1);}
        .badge { background: var(--border); color: var(--text-main); padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 8px;}
        .tab-btn.active .badge { background: var(--primary); color: white; }

        .filters-panel { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        .fase-filters { display: none; gap: 12px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .btn-fase { flex: 1; min-width: 200px; padding: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; text-align: left; cursor: pointer; transition: 0.2s;}
        .btn-fase:hover { border-color: var(--primary); }
        .btn-fase.active { border-color: var(--primary); background: #EAEFFF; box-shadow: 0 4px 10px rgba(30, 70, 197, 0.1);}
        .btn-fase strong { display: block; font-size: 15px; color: var(--text-main); margin-bottom: 4px; }
        .btn-fase small { font-size: 12px; color: var(--text-light); }

        .search-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
        .search-item label { display: block; font-size: 12px; font-weight: 700; color: var(--text-main); margin-bottom: 6px; }
        .search-item input, .search-item select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: #FFFFFF; outline: none; color: var(--text-main);}
        .search-item input:focus, .search-item select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(30, 70, 197, 0.1);}

        .actions-bar {
            background: rgba(255, 255, 255, 0.9); padding: 16px 20px; border-radius: 12px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .action-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .btn-export {
            background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 8px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(30, 70, 197, 0.2);
        }
        .btn-export:hover { background: var(--secondary); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(30, 70, 197, 0.3);}
        .btn-export.special { background: var(--accent); color: var(--text-main); box-shadow: 0 4px 10px rgba(25, 240, 0, 0.3);}
        .btn-export.special:hover { background: var(--accent-hover); box-shadow: 0 6px 15px rgba(25, 240, 0, 0.4); color: white;}
        .btn-export.outline { background: white; color: var(--primary); border: 1px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05);}
        .btn-export.outline:hover { background: var(--primary); color: white; transform: translateY(-2px); }

        .table-container { background: rgba(255, 255, 255, 0.95); border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; max-height: 600px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);}
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #F4F6FA; padding: 14px 16px; text-align: left; position: sticky; top: 0; border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; z-index: 10; color: var(--primary); font-weight: 800;}
        td { padding: 12px 16px; border-bottom: 1px solid var(--border); }
        tr:hover { background: #EAEFFF; }

        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .st-fase1 { background: #FFF3CD; color: #D97706; border: 1px solid #FDE68A;}
        .st-fase2 { background: #DBEAFE; color: #1D4ED8; border: 1px solid #BFDBFE;}
        .st-op { background: #DCFCE7; color: #15803D; border: 1px solid #BBF7D0;}

        /* AÇÃO INDIVIDUAL CLICÁVEL */
        .copyable { cursor: pointer; transition: all 0.2s; position: relative; }
        .copyable:hover { background-color: rgba(30, 70, 197, 0.1); font-weight: 600; color: var(--primary); }

        .btn-copy-row {
            background: #F4F6FA; border: 1px solid var(--primary); color: var(--primary);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.2s;
        }
        .btn-copy-row:hover { background: var(--primary); color: white; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: var(--text-main);
            padding: 14px 28px; border-radius: 8px; font-weight: 700; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 9999;
            box-shadow: 0 10px 30px rgba(25, 240, 0, 0.3); border: 2px solid #FFFFFF;
        }
        .toast.show { opacity: 1; transform: translateY(-10px); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand-container">
            <div class="logo-box">
                <img id="logoImg" src="logo.png" alt="Logo Fast Tennis" onerror="this.style.display='none';">
            </div>
            <div class="header-title">
                <h1>Fast Tennis <span class="highlight-text">• Franqueados</span></h1>
                <p>Lista Oficial de Franqueados</p>
            </div>
        </div>
        
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
            <div class="update-badge" id="top-update-time">⏱️ Aguardando Sync...</div>
        </div>
    </header>

    <!-- SESSÃO DE SINCRONIZAÇÃO AUTOMÁTICA -->
    <div class="sync-panel">
        <div class="sync-info">
            <h2><span id="sync-dot" class="status-dot"></span> <span id="sync-title">Sincronizando Banco de Dados...</span></h2>
            <p id="sync-desc">Conectando ao Google Drive da Fast Tennis.</p>
        </div>
        <button class="btn-sync" onclick="loadGoogleSheetsData()">🔄 Atualizar Agora</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="setTab('implantação')" id="tab-imp">
            🚀 Implantação <span class="badge" id="count-imp">0</span>
        </button>
        <button class="tab-btn" onclick="setTab('operação')" id="tab-op">
            🎾 Operação <span class="badge" id="count-op">0</span>
        </button>
    </div>

    <div class="filters-panel">
        <div class="fase-filters" id="fase-filters">
            <button class="btn-fase" id="btn-fase1" onclick="setFaseFilter('fase1')">
                <strong>🔍 Fase 1 (1/2)</strong>
                <small>Negociação e Prospecção</small>
            </button>
            <button class="btn-fase" id="btn-fase2" onclick="setFaseFilter('fase2')">
                <strong>🏗️ Fase 2 (2/2)</strong>
                <small>Projetos e Em Obra</small>
            </button>
            <button class="btn-fase active" id="btn-fase-all" onclick="setFaseFilter('all')">
                <strong>📋 Todas as Fases</strong>
                <small>Toda a rede de implantação</small>
            </button>
        </div>

        <div class="search-grid">
            <div class="search-item">
                <label>🔍 Buscar (Nome, Unidade, Cidade)</label>
                <input type="text" id="search-input" placeholder="Digite para buscar..." oninput="renderTable()">
            </div>
            <div class="search-item">
                <label>🗺️ Estado (UF)</label>
                <select id="estado-select" onchange="renderTable()"><option value="">Todos</option></select>
            </div>
        </div>
    </div>

    <div class="actions-bar">
        <div style="font-size: 14px; font-weight: bold; color: var(--primary);">
            📊 Exibindo <span id="list-count" style="color: var(--primary); font-size:16px;">0</span> registros
        </div>
        <div class="action-btns">
            <button class="btn-export special" onclick="exportBasePesquisa()">📥 Baixar Base da Pesquisa (.xlsx)</button>
            <button class="btn-export outline" onclick="copyData('email')">📧 Copiar E-mails</button>
            <button class="btn-export outline" onclick="copyData('phone')">📞 Copiar Telefones</button>
            <button class="btn-export outline" onclick="copyData('address')">📍 Copiar Endereços</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Status</th>
                    <th>UF</th>
                    <th>Unidade / Local</th>
                    <th>Cidade</th>
                    <th>Franqueado</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th style="text-align:center;">Ação Individual</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="toast" class="toast">Ação realizada com sucesso!</div>

<script>
    // =========================================================================
    // URL DO EXCEL COMPLETO NO GOOGLE DRIVE (OUTPUT=XLSX PARA LER LINHAS OCULTAS)
    // =========================================================================
    const RAW_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRksu0DDNfpfwMZx6TTKNwdMR0Yf7ks3VWYV64z-5OPgiE9czUV_l1KGLDcFZC8Q/pub?output=xlsx";

    let dataImp = [];
    let dataOp = [];
    let currentTab = 'implantação';
    let currentFase = 'all'; 
    let currentData = [];

    window.onload = () => {
        loadGoogleSheetsData();
    };

    // ==========================================
    // BUSCA AUTOMÁTICA NO GOOGLE DRIVE VIA MULTI-PROXY
    // ==========================================
    async function loadGoogleSheetsData() {
        document.getElementById('sync-dot').classList.remove('online', 'error');
        document.getElementById('sync-title').innerText = "Sincronizando com o Drive...";
        document.getElementById('sync-desc').innerText = "Conectando ao melhor servidor...";

        const ts = new Date().getTime();
        const targetUrl = `${RAW_URL}&t=${ts}`;
        
        const proxies = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
            `https://thingproxy.freeboard.io/fetch/${targetUrl}`
        ];

        let arrayBuffer = null;
        let proxySuccess = false;

        for (let url of proxies) {
            try {
                const res = await fetch(url);
                if (res.ok) {
                    arrayBuffer = await res.arrayBuffer();
                    proxySuccess = true;
                    break; 
                }
            } catch (e) {
                console.warn("Proxy falhou, tentando o próximo...", url);
            }
        }

        if (!proxySuccess || !arrayBuffer) {
            document.getElementById('sync-title').innerText = "Aviso de Conexão";
            document.getElementById('sync-dot').classList.add('error');
            document.getElementById('sync-desc').innerHTML = "<span style='color:#EF4444; font-weight:bold;'>Falha na sincronização. O Google bloqueou a conexão automática no momento. Tente atualizar a página.</span>";
            return;
        }

        try {
            const workbook = XLSX.read(arrayBuffer, {type: 'array'});
            
            const sheetImp = workbook.Sheets['Implantação'];
            if (sheetImp) parseImplantacao(sheetImp);

            const sheetOp = workbook.Sheets['Operação'];
            if (sheetOp) parseOperacao(sheetOp);

            finishSync();
        } catch (error) {
            console.error(error);
            document.getElementById('sync-title').innerText = "Erro na Leitura";
            document.getElementById('sync-dot').classList.add('error');
            document.getElementById('sync-desc').innerText = "Formato de arquivo incompatível baixado pelo proxy.";
        }
    }

    function finishSync() {
        document.getElementById('sync-dot').classList.add('online');
        document.getElementById('sync-dot').classList.remove('error');
        document.getElementById('sync-title').innerText = `Banco de Dados Sincronizado!`;
        
        let d = new Date();
        let dateStr = d.toLocaleDateString('pt-BR');
        let hr = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
        
        document.getElementById('sync-desc').innerText = `O sistema ignora os inativos. Última sincronização online: Hoje às ${hr}`;
        document.getElementById('top-update-time').innerHTML = `⏱️ Atualizado: ${dateStr} às ${hr}`;

        document.getElementById('count-imp').textContent = dataImp.length;
        document.getElementById('count-op').textContent = dataOp.length;
        setTab('implantação');
        showToast("✅ Base de dados atualizada e limpa!");
    }

    // ==========================================
    // PARSERS (LEITURA COM VERIFICAÇÃO DE LINHA OCULTA E TRAVAS)
    // ==========================================
    function parseImplantacao(sheet) {
        dataImp = [];
        const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, blankrows: true, defval: ""});
        const rowInfos = sheet['!rows'] || [];

        let lastEstado = "", lastLocal = "", lastCidade = "", lastFase = "", lastEndereco = "";
        
        for (let i = 2; i < rows.length; i++) {
            if (rowInfos[i] && rowInfos[i].hidden) continue;

            const row = rows[i];
            if (!row || row.length < 5) continue;
            
            let fase = String(row[0] || "").trim();
            let estado = String(row[1] || "").trim();
            let local = String(row[2] || "").trim();
            let cidade = String(row[3] || "").trim();
            let franqueado = String(row[5] || "").trim(); 
            let email = String(row[6] || "").trim();      
            let telefone = String(row[7] || "").trim();   
            let endereco = String(row[8] || "").trim();   
            
            if (fase) lastFase = fase; else fase = lastFase;
            if (estado) lastEstado = estado; else estado = lastEstado;
            if (local) lastLocal = local; else local = lastLocal;
            if (cidade) lastCidade = cidade; else cidade = lastCidade;
            if (endereco) lastEndereco = endereco; else endereco = lastEndereco;
            
            let fLow = fase.toLowerCase();
            if (fLow.includes('pausado') || fLow.includes('standy') || fLow.includes('repassad') || fLow.includes('cancelad')) continue;

            if (!franqueado && !email) continue;
            let fLowTest = franqueado.toLowerCase();
            if (fLowTest === 'franqueados' || fLowTest === 'nome' || fLowTest === '') continue;
            
            let faseNorm = "Em Obra";
            if (fLow.includes('negoc')) faseNorm = 'Negociação de Ponto';
            else if (fLow.includes('prospec') || fLow.includes('ponto')) faseNorm = 'Prospecção de Ponto';
            else if (fLow.includes('projet')) faseNorm = 'Projetos';
            
            dataImp.push({ fase_norm: faseNorm, estado: lastEstado, local: lastLocal, cidade: lastCidade, franqueado, email, telefone, endereco: lastEndereco });
        }
    }

    function parseOperacao(sheet) {
        dataOp = [];
        const rows = XLSX.utils.sheet_to_json(sheet, {header: 1, blankrows: true, defval: ""});
        const rowInfos = sheet['!rows'] || [];

        let lastEstado = "", lastCidade = "", lastUnidade = "", lastEndereco = "";
        
        for (let i = 1; i < rows.length; i++) {
            if (rowInfos[i] && rowInfos[i].hidden) continue;

            const row = rows[i];
            if (!row || row.length < 5) continue;
            
            let estado = String(row[0] || "").trim();     
            let cidade = String(row[1] || "").trim();     
            let unidade = String(row[2] || "").trim();    
            let franqueado = String(row[9] || "").trim(); 
            let email = String(row[11] || "").trim();     
            let telefone = String(row[12] || "").trim();  
            let endereco = String(row[13] || "").trim();  
            
            if (estado) lastEstado = estado; else estado = lastEstado;
            if (cidade) lastCidade = cidade; else cidade = lastCidade;
            if (unidade) lastUnidade = unidade; else unidade = lastUnidade;
            if (endereco) lastEndereco = endereco; else endereco = lastEndereco;
            
            let franqueadoLow = franqueado.toLowerCase();
            if (franqueadoLow === 'nome do franqueado' || franqueadoLow === 'cargos' || franqueadoLow === 'franqueado' || franqueadoLow === '') continue;
            if (!franqueado && !email) continue;
            
            dataOp.push({
                fase_norm: "Operação",
                estado: lastEstado,
                cidade: lastCidade,   
                local: lastUnidade,   
                franqueado, email, telefone, endereco: lastEndereco
            });
        }
    }

    // ==========================================
    // LÓGICA DE ABAS E TABELAS
    // ==========================================
    function setTab(tab) {
        currentTab = tab;
        document.getElementById('tab-imp').classList.toggle('active', tab === 'implantação');
        document.getElementById('tab-op').classList.toggle('active', tab === 'operação');
        
        document.getElementById('fase-filters').style.display = tab === 'implantação' ? 'flex' : 'none';
        document.getElementById('search-input').value = '';
        currentFase = 'all';
        updateFaseButtons();
        
        populateEstados();
        renderTable();
    }

    function setFaseFilter(fase) {
        currentFase = fase;
        updateFaseButtons();
        renderTable();
    }

    function updateFaseButtons() {
        document.getElementById('btn-fase1').classList.toggle('active', currentFase === 'fase1');
        document.getElementById('btn-fase2').classList.toggle('active', currentFase === 'fase2');
        document.getElementById('btn-fase-all').classList.toggle('active', currentFase === 'all');
    }

    function populateEstados() {
        const dataset = currentTab === 'implantação' ? dataImp : dataOp;
        const estados = [...new Set(dataset.map(d => d.estado))].filter(Boolean).sort();
        const select = document.getElementById('estado-select');
        select.innerHTML = '<option value="">Todos</option>' + estados.map(e => `<option value="${e}">${e}</option>`).join('');
    }

    function getFaseCategoria(faseNorm) {
        if (faseNorm === 'Negociação de Ponto' || faseNorm === 'Prospecção de Ponto') return 'fase1';
        return 'fase2'; 
    }

    function getFaseLabel(faseNorm) {
        return getFaseCategoria(faseNorm) === 'fase1' ? '1/2' : '2/2';
    }

    function renderTable() {
        const dataset = currentTab === 'implantação' ? dataImp : dataOp;
        const search = document.getElementById('search-input').value.toLowerCase();
        const estado = document.getElementById('estado-select').value;

        currentData = dataset.filter(item => {
            const textMatch = !search || 
                (item.franqueado || '').toLowerCase().includes(search) ||
                (item.local || '').toLowerCase().includes(search) ||
                (item.cidade || '').toLowerCase().includes(search);
            
            const estadoMatch = !estado || item.estado === estado;

            let faseMatch = true;
            if (currentTab === 'implantação' && currentFase !== 'all') {
                faseMatch = getFaseCategoria(item.fase_norm) === currentFase;
            }

            return textMatch && estadoMatch && faseMatch;
        });

        document.getElementById('list-count').textContent = currentData.length;

        const tbody = document.getElementById('table-body');
        if (currentData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 30px; font-weight:bold; color:var(--text-light);">Aguardando dados ou nenhum registro encontrado.</td></tr>`;
            return;
        }

        tbody.innerHTML = currentData.map((item, idx) => {
            let badgeClass = 'st-op';
            if (currentTab === 'implantação') {
                badgeClass = getFaseCategoria(item.fase_norm) === 'fase1' ? 'st-fase1' : 'st-fase2';
            }

            return `
                <tr>
                    <td><span class="status-badge ${badgeClass}">${item.fase_norm || 'Ativo'}</span></td>
                    <td><strong>${item.estado || '-'}</strong></td>
                    <td>${item.local || '-'}</td>
                    <td>${item.cidade || '-'}</td>
                    <td><strong>${item.franqueado || '-'}</strong></td>
                    <td class="copyable" onclick="copyText('${item.email}', 'E-mail')" title="Clique para copiar este E-mail">${item.email || '-'}</td>
                    <td class="copyable" onclick="copyText('${item.telefone}', 'Telefone')" title="Clique para copiar este Telefone">${item.telefone || '-'}</td>
                    <td style="text-align:center;">
                        <button class="btn-copy-row" onclick="copyRow(${idx})" title="Copiar os dados organizados em texto">📋 Copiar Dados</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // ==========================================
    // CÓPIAS INDIVIDUAIS POR CLIQUE NA CÉLULA
    // ==========================================
    function copyText(text, label) {
        if (!text || text === '-') return;
        navigator.clipboard.writeText(text).then(() => {
            showToast(`✅ ${label} copiado!`);
        });
    }

    // ==========================================
    // EXPORTAÇÃO XLSX & COPIAR/COLAR EM MASSA
    // ==========================================
    function exportBasePesquisa() {
        if (currentData.length === 0) {
            showToast('Nenhum dado para exportar. Aguarde a sincronização.');
            return;
        }

        let exportData = [];

        if (currentTab === 'implantação') {
            exportData = currentData.map(d => ({
                "Nome": d.franqueado || '',
                "E-mail": d.email || '',
                "Fase": getFaseLabel(d.fase_norm),
                "Unidade": "Onboarding"
            }));
        } else {
            exportData = currentData.map(d => ({
                "Cidade": d.local || '', 
                "Franqueado": d.franqueado || '',
                "E-mail": d.email || '',
                "Unidade": "Ongoing"
            }));
        }

        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Base_NPS");
        
        let faseName = currentFase === 'all' ? 'TodasFases' : (currentFase === 'fase1' ? 'Fase1' : 'Fase2');
        let filename = currentTab === 'implantação' 
            ? `Base_Pesquisa_Implantacao_${faseName}.xlsx` 
            : `Base_Pesquisa_Operacao.xlsx`;

        XLSX.writeFile(wb, filename);
        showToast('📥 Arquivo Excel (XLSX) gerado com sucesso!');
    }

    function copyRow(idx) {
        const d = currentData[idx];
        let text = "";

        if (currentTab === 'implantação') {
            text = `👤 Franqueado: ${d.franqueado || '-'}\n🏙️ Cidade/Local: ${d.cidade || '-'}\n📞 Telefone: ${d.telefone || '-'}\n📧 E-mail: ${d.email || '-'}`;
        } else {
            let localName = d.local || '-';
            if (localName !== '-' && !localName.toLowerCase().includes('fast tennis')) {
                localName = 'Fast Tennis ' + localName;
            }
            text = `🎾 Unidade: ${localName}\n📞 Telefone: ${d.telefone || '-'}\n📍 Endereço: ${d.endereco || '-'}\n📧 E-mail: ${d.email || '-'}\n👤 Franqueado: ${d.franqueado || '-'}`;
        }

        navigator.clipboard.writeText(text).then(() => {
            showToast(`✅ Dados copiados! Pronto para colar no WhatsApp/E-mail.`);
        });
    }

    function copyData(type) {
        if (currentData.length === 0) {
            showToast('Nenhum dado para copiar. Aguarde a sincronização.');
            return;
        }

        let lines = [];
        if (type === 'email') {
            lines = currentData.filter(d => d.email).map(d => `${d.franqueado}\t${d.email.trim()}`);
        } else if (type === 'phone') {
            lines = currentData.filter(d => d.telefone && d.telefone !== '-').map(d => `${d.franqueado}\t${d.telefone.trim()}`);
        } else if (type === 'address') {
            lines = currentData.map(d => {
                let localName = d.local || 'Unidade';
                if (!localName.toLowerCase().includes('fast tennis')) {
                    localName = 'Fast Tennis ' + localName;
                }
                
                let cidadeInfo = d.cidade ? `${d.cidade}` : '';
                let estadoInfo = d.estado ? ` / ${d.estado}` : '';
                let endInfo = (d.endereco && d.endereco !== '-') ? d.endereco : 'Endereço não informado';
                
                return `🎾 ${localName}\n🏙️ ${cidadeInfo}${estadoInfo}\n📍 ${endInfo}`;
            });
        }

        if (lines.length > 0) {
            let joinChar = type === 'address' ? '\n\n' : '\n';
            navigator.clipboard.writeText(lines.join(joinChar)).then(() => {
                showToast(`✅ ${lines.length} itens copiados! Use Ctrl+V no Excel.`);
            });
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);
    }
</script>
